<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="Login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<body>
    <section class="container-login">
        <div class="container_1">
            <div class="welcome">
                <p>Welcome</p>
                <p>To</p>
                <p>Bishal Library</p>
            </div>

            <div class="screen-login">
                
                <div class="logo-login">
                    <i class="fa-solid fa-book" style="padding-right: 5px;"></i>
                    <span>Library</span>
                </div>
                <div class="login">Login</div>
                
                <div class="login_field">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="Username/email">
                </div>
                
                <div class="login_field">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="Password">
                </div>
                
                <a href="admin.html">LOG IN</a>
                
                <div class="forget">
                    Forget password?
                </div>
                
                <div class="other">
                    <div class="icon-1"><i class="fa-brands fa-google fa-2x"></i></div>
                    <div class="icon-2"><i class="fa-brands fa-facebook fa-2x"></i></div>
                    <div class="icon-3"><i class="fa-brands fa-x-twitter fa-2x"></i></div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
